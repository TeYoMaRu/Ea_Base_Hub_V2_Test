<!DOCTYPE html>
<html lang="th">
<head>
  <!-- =====================================================
       BASIC META
       ===================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แผนการเดินทางและเบิกทดลองจ่าย ๑</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ===================================================== -->
  <!-- GOOGLE FONT                                           -->
  <!-- ===================================================== -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="css/formPlan.css">
</head>


<body>

<!-- =====================================================
     NAVIGATION (ติดบน)
     ===================================================== -->
<div class="layout">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/icons/icon-192.png" alt="logo">
      <span class="sidebar-header"> EABaseHub </span>
    </div>

    <nav class="sidebar-menu">
      <a href="index.html">
        <span class="material-symbols-outlined">home</span>
        หน้าแรก
      </a>

      <a href="report.html">
        <span class="material-symbols-outlined">assignment</span>
        รายงานเยี่ยมร้านค้า
      </a>

      <a href="formPlan.html" class="active">
        <span class="material-symbols-outlined">map</span>
        ฟอร์ม ๑
      </a>

      <a href="formActual.html">
        <span class="material-symbols-outlined">check_circle</span>
        ฟอร์ม ๒
      </a>
    </nav>

    <div class="sidebar-logout">
      <!-- ป้ายอีเมลและปุ่ม Logout -->
              <div style="display: flex; align-items: center; gap: 10px">
                
                <button class="logout-btn" onclick="logout()">
                  ออกจากระบบ
                </button>
              </div>
  
    
              
  </aside>


<!-- =====================================================
     MAIN PAGE
     ===================================================== -->
<!-- ===== Main Content ===== -->
  <main class="main-content">

    <div class="page">

      <!-- TITLE -->
      <h1>ฟอร์มแผนการเดินทางและเบิกจ่าย ๑</h1>

      <!-- SECTION: ข้อมูลหลัก -->
      <div class="section summary-section">
        <h3>ข้อมูลพนักงาน / ช่วงเวลา</h3>

        <div class="form-row">
          <div class="form-group">
            <label for="empName">พนักงานขาย</label>
            <input id="empName" readonly>
          </div>

          <div class="form-group">
            <label for="area">เขตการขาย</label>
            <input id="area" readonly>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="startDate">ระหว่างวันที่</label>
            <input type="date" id="startDate">
          </div>

          <div class="form-group">
            <label for="endDate">ถึงวันที่</label>
            <input type="date" id="endDate">
          </div>
        </div>
      </div>

     

  <!-- ================= ตารางกรอกข้อมูล ================= -->
<div class="section summary-section">
  <h3>แผนการเดินทาง</h3>

  <div class="badge">
    ร้านในความรับผิดชอบ
    <span id="shopCount"> 0 </span> ร้าน
  </div>

  <table id="tripTable" class="trip-table">
    <thead>
      <tr>
        <th>ว/ด/ป</th>
        <th>จากจังหวัด</th>
        <th>ไปจังหวัด</th>
        <th>ร้านค้า 1</th>
        <th>ร้านค้า 2</th>
        <th>ร้านค้า 3</th>
        <th>หมายเหตุ</th>
      </tr>
    </thead>
    <tbody id="tripTableBody">
      <!-- JS จะเพิ่มแถวให้ -->
    </tbody>
  </table>

  <div class="actions">
    <button type="button" onclick="addRow()">➕ เพิ่มแถว</button>
    <button type="button" onclick="removeRow()">➖ ลบแถว</button>
    <button class="btn-save" onclick="savePlanToDatabase('draft')">💾 Save Draft</button>
  </div>

 
</div>

  <!-- ================= SECTION: สรุปค่าใช้จ่าย ================= -->
  <div class="section summary-section">
  <h3>สรุปแผนการเดินทางและเบิกจ่าย</h3>

  <div class="summary-grid">

    <div class="summary-item">
      <label>เบี้ยเลี้ยง</label>
      <input type="number" id="allowanceRate" placeholder="บาท/วัน">
      <!-- <span>ต่อวัน</span> -->
    </div>
    
    <div class="summary-item">
      <label>ค่าที่พัก(ราคา)</label>
      <input type="number" id="hotelRate" placeholder="บาท/คืน">
      <!-- <span>ต่อวัน</span> -->
    </div>

     <div class="summary-item">
      <label>ค่าใช้จ่ายอื่นๆ</label>
      <input type="number" id="otherCost" placeholder="บาท">
      <!-- <span>บาท</span> -->
    </div>
     
    
    <div class="summary-item">
      <label>จำนวน(วัน)</label>
      <input type="number" id="allowanceDays" placeholder="จำนวน(วัน)">
      <!-- <span>วัน</span> -->
    </div>

   <div class="summary-item">
      <label>รวมพัก(คืน)</label>
      <input type="number" id="hotelNights" placeholder="จำนวน(คืน)">
      <!-- <span>วัน</span> -->
    </div>

    <div class="summary-item total">
      <label>รวมเบิกทั้งหมด</label>
      <input type="text" id="grandTotal" placeholder="บาท" readonly>
     <!-- <span>บาท</span> -->
    </div>

  </div>

   <div class="actions">
    <button onclick="openPreview()">💾 บันทึกและดูตัวอย่าง</button>
  </div>

  <!-- <div class="actions">
    <button onclick="exportTrips()">📤 Export CSV</button>
  </div> -->
</div>


<!-- ===============================
     PREVIEW MODAL
================================= -->
<div id="previewModal" class="preview-modal">
  <div class="preview-wrapper">
    
    <div class="preview-actions">
      <button onclick="savePlanToDatabase('completed')">💾 Save</button>
      <button onclick="printPreview()">🖨 Print</button>
      <button onclick="exportPDF()">📤 Export PDF</button>
      <button onclick="closePreview()">✖ ปิด</button>
    </div>

    <!-- A4 AREA -->
    <div id="previewContent" class="a4-page">
      <!-- JS จะ generate ตารางตรงนี้ -->
    </div>

  </div>
</div>


<!-- =====================================================
     SCRIPT
     ===================================================== -->
<script src="js/core/supabaseClient.js"></script>
<script src="js/core/auth.js"></script>
<script src="js/formPlan.js"></script>

</body>
</html>
