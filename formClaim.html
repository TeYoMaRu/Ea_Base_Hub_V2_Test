<!DOCTYPE html>
<html lang="th">
<head>
  <!-- กำหนด character encoding เป็น UTF-8 เพื่อรองรับภาษาไทย -->
  <meta charset="UTF-8">
  
  <!-- กำหนดให้หน้าเว็บแสดงผลได้ดีบนมือถือ (responsive) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- ชื่อหน้าเว็บที่แสดงบน tab เบราว์เซอร์ -->
  <title>แจ้งเคลมสินค้า</title>

  <!-- นำเข้าฟอนต์ Kanit จาก Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

  


  <!-- เชื่อมโยงไฟล์ CSS ภายนอก -->
  <link rel="stylesheet" href="css/formClaim.css">
</head>

<body>

  <!-- =====================================================
       HEADER SECTION (ส่วนหัวเว็บไซต์)
       แสดงชื่อระบบและชื่อผู้ใช้งาน
       ===================================================== -->
 <header class="app-header">

    <!-- ส่วนโลโก้และชื่อระบบ -->
    <div class="logo">
      <!-- รูปโลโก้ (ถ้ามี) -->
      <img src="assets/icons/icon-192.png" alt="logo">
      <!-- ชื่อระบบ -->
      <h2>EABaseHub</h2>
    </div>
       
    <!-- แสดงชื่อผู้ใช้งาน (JavaScript สามารถเปลี่ยนค่านี้ได้ภายหลัง) -->
    <div class="user-name">ผู้ใช้งาน</div>

  </header>


  <!-- =====================================================
       NAVIGATION SECTION (ส่วนเมนูนำทาง)
       แสดงลิงก์ไปยังหน้าต่างๆ ในระบบ
       ===================================================== -->
  <nav class="app-nav">
    <!-- เมนูหน้าแรก -->
    <a href="index.html">หน้าแรก</a>
    
    <!-- เมนูรายงานเยี่ยมร้านค้า -->
    <a href="report.html">รายงานเยี่ยมร้านค้า</a>
    
    <!-- เมนู FormsHub -->
    <a href="formHub.html">FormsHub</a>
    
    <!-- เมนูแจ้งเคลมสินค้า (หน้าปัจจุบัน - ใช้ class="active") -->
    <a href="formClaim.html" class="active">แจ้งเคลมสินค้า</a>
  </nav>


  <!-- =====================================================
       MAIN CONTENT (เนื้อหาหลักของหน้า)
       ===================================================== -->
  <div class="page">

    <!-- =====================================================
         SECTION 1: ฟอร์มข้อมูลสินค้า
         กรอกข้อมูลเบื้องต้นเกี่ยวกับสินค้าที่ต้องการเคลม
         ===================================================== -->
    <div class="card">
      <!-- หัวเรื่อง -->
      <h3>⚠️ แจ้งเคลมสินค้า</h3>

      <!-- ===================================================== -->
<!-- MAIN CONTENT CONTAINER                                 -->
<!-- ===================================================== -->
<main class="container">


  <!-- ===================================================== -->
  <!-- SECTION A : FORM INPUT                                -->
  <!-- ===================================================== -->
  <div class="section">

    <h4>กรอกข้อมูลเบื้องต้นเกี่ยวกับสินค้าที่ต้องการเคลม</h4>

    <!-- Grid สำหรับจัดเรียงช่องกรอก -->
<div class="form-grid">

  <!-- วันที่ -->
  <div class="form-group col-3">
    <label>วันที่แจ้งเคลม</label>
    <input type="date" id="reportDate">
  </div>

  <!-- ร้านค้า -->
  <div class="form-group col-3">
    <label>ร้านค้า</label>
    <select id="shopSelect">
      <option value="">-- เลือกร้านค้า --</option>
    </select>
  </div>

  <!-- หมวด -->
  <div class="form-group col-3">
    <label>สินค้าที่ขายกับร้านนี้</label>
    <select id="categorySelect">
      <option value="">-- เลือกหมวด --</option>
    </select>
  </div>

  <!-- สินค้า -->
  <div class="form-group col-3">
    <label>สินค้า</label>
    <select id="productSelect">
      <option value="">-- เลือกสินค้า --</option>
    </select>
  </div>

  <div id="dynamicAttributes" class="col-12"></div>

  <!-- สถานะ -->
  <div class="form-group col-4">
    <label>สถานะเคลม</label>
    <select id="status">
      <option>รอผล</option>
      <option>อนุมัติเคลม</option>
    </select>
  </div>

  <!-- จำนวน -->
  <div class="form-group col-4">
    <label>จำนวนเคลม</label>
    <input type="number" id="amount">
  </div>

  <!-- วันที่ติดตาม -->
  <div class="form-group col-4">
    <label>วันที่ติดตาม</label>
    <input type="date" id="followupDate">
  </div>

  <!-- ชื่อสินค้า -->
  <div class="form-group col-8">
    <label>สินค้า</label>
    <input type="text" id="product" placeholder="ระบุชื่อสินค้า">
  </div>

  <!-- วันที่แจ้งเคลม -->
  <div class="form-group col-4">
    <label>วันที่แจ้งเคลม</label>
    <input type="date" id="claimDate">
  </div>

  <!-- จำนวน / รุ่น -->
  <div class="form-group col-8">
    <label>จำนวน / รุ่น</label>
    <input type="text" id="qty" placeholder="เช่น 2 ชิ้น, รุ่น ABC-123">
  </div>

  <!-- วันที่ซื้อ -->
  <div class="form-group col-4">
    <label>วันที่ซื้อสินค้า</label>
    <input type="date" id="buyDate">
  </div>

  <!-- รายละเอียด -->
  <div class="form-group col-12">
    <label>รายละเอียด</label>
    <textarea id="note" rows="4"></textarea>
  </div>

</div>
    <!-- อัพโหลด -->
    <div class="form-group">
  <label>แนบรูปภาพ / วิดีโอ</label>

  <div class="upload-grid" id="uploadGrid">

    <label class="upload-box">
      +
      <input 
        type="file"
        id="claimMedia"
        accept="image/*,video/*"
        multiple
        hidden
      >
    </label>

  </div>

  

</div>
  
  
  <!-- ปุ่มบันทึก -->
  <div class="actions">
    <button class="btn-draft">💾 Save Draft</button>
    <button class="btn-save" onclick="saveReport()">✅ บันทึก</button>
  </div>

</div>

    <!-- =====================================================
         SECTION 2: เลือกประเภทปัญหา
         คลิกเลือกประเภทปัญหาที่พบ (สามารถเลือกได้หลายข้อ)
         ===================================================== -->
    <div class="card">
      <!-- หัวเรื่อง -->
      <h3>📦 ประเภทปัญหา</h3>
      
      <!-- กริดแสดงตัวเลือกประเภทปัญหา -->
      <div class="claim-grid" id="claimTypes">
        <!-- แต่ละช่องจะมี class "claim-item" -->
        <!-- เมื่อคลิกจะเพิ่ม class "active" (จัดการด้วย JavaScript) -->
        <div class="claim-item">ชำรุดจากขนส่ง</div>
        <div class="claim-item">พลาสติกแตกร้าว</div>
        <div class="claim-item">หลอดไม่ติด</div>
        <div class="claim-item">อุปกรณ์ไม่ครบ</div>
        <div class="claim-item">สภาพสินค้า</div>
        <div class="claim-item">อื่นๆ</div>
      </div>
    </div>


    <!-- =====================================================
         SECTION 3: รายละเอียดเพิ่มเติม
         กรอกรายละเอียดเพิ่มเติมหรือคำอธิบายปัญหา
         ===================================================== -->
    <div class="card">
      <!-- หัวเรื่อง -->
      <h3>📝 รายละเอียดเพิ่มเติม</h3>
      
      <!-- ช่องกรอกข้อความแบบหลายบรรทัด -->
      <textarea 
        rows="4" 
        id="detail" 
        placeholder="อธิบายรายละเอียดปัญหาที่พบ..."
      ></textarea>
    </div>


    <!-- =====================================================
         SECTION 4: ปุ่มดำเนินการ
         บันทึกแบบร่าง, ส่งเคลม หรือกลับหน้าก่อนหน้า
         ===================================================== -->
    <div class="actions">
      <!-- ปุ่มบันทึกแบบร่าง (Draft) -->
      <button class="btn-draft" onclick="saveDraft()">
        💾 Save Draft
      </button>
      
      <!-- ปุ่มส่งเคลม (Submit) -->
      <button class="btn-submit" onclick="submitClaim()">
        ▶️ ส่งเคลม
      </button>
      
      <!-- ปุ่มกลับหน้าก่อนหน้า -->
      <button class="btn-back" onclick="history.back()">
        ↩️ กลับ
      </button>
    </div>


    <!-- =====================================================
         SECTION 5: รายการ Draft
         แสดงรายการเคลมที่บันทึกไว้แบบร่าง
         ===================================================== -->
    <div class="card">
      <!-- หัวเรื่อง -->
      <h2>📋 รายการ Draft</h2>
      
      <!-- ตารางแสดงข้อมูล -->
      <table>
        <!-- หัวตาราง -->
        <thead>
          <tr>
            <th>วันที่</th>
            <th>สินค้า</th>
            <th>สถานะ</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        
        <!-- เนื้อหาตาราง (จะถูกเพิ่มด้วย JavaScript) -->
        <tbody id="draftBody">
          <!-- JavaScript จะเพิ่ม <tr> เข้ามาที่นี่ -->
        </tbody>
      </table>
    </div>

  </div>
  <!-- สิ้นสุด page -->


  <!-- =====================================================
       เชื่อมโยงไฟล์ JavaScript
       ===================================================== -->
   <!-- =====================================================
       📦 SCRIPTS - เรียงลำดับตามความสำคัญ
       ===================================================== -->
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Supabase Client Config (ต้องมาก่อน formClaim.js) -->
  <script src="js/core/supabaseClient.js"></script>

  <script src="js/core/auth.js"></script>
  
  <!--  Form Claim Script (ใช้ supabaseClient จาก file ก่อนหน้า) -->
  <script src="js/formClaim.js"></script>

</body>
</html>
