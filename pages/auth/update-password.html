<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งรหัสผ่านใหม่ - EABaseHub</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/pages/auth/login.css">
</head>

<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="logo">
      <img src="/assets/icons/icon-192.png">
      <h1>EABaseHub</h1>
      <p>ตั้งรหัสผ่านใหม่</p>
    </div>

    <form id="updateForm">

      <div class="form-group">
        <label>รหัสผ่านใหม่</label>
        <div class="input-box">
          <i class="fa-solid fa-lock icon-left"></i>
          <input type="password" id="password" required>
        </div>
      </div>

      <div class="form-group">
        <label>ยืนยันรหัสผ่าน</label>
        <div class="input-box">
          <i class="fa-solid fa-lock icon-left"></i>
          <input type="password" id="confirm" required>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn">
        <span class="btn-text">บันทึกรหัสผ่าน</span>
        <span class="spinner"></span>
      </button>

    </form>

  </div>
</div>

<script src="/js/core/supabaseClient.js"></script>

<script>
const form = document.getElementById("updateForm");
const btn = document.getElementById("btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;

  if (password !== confirm) {
    return alert("❌ รหัสผ่านไม่ตรงกัน");
  }

  btn.classList.add("loading");

  const { error } = await supabase.auth.updateUser({
    password: password
  });

  btn.classList.remove("loading");

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("✅ เปลี่ยนรหัสผ่านสำเร็จ");
    window.location.href = "/pages/auth/login.html";
  }
});
</script>

</body>
</html>
