<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลืมรหัสผ่าน - EABaseHub</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- ใช้ CSS เดียวกับ login -->
  <link rel="stylesheet" href="/css/pages/auth/login.css">
</head>

<body>

<!-- ================================
     SPLASH SCREEN
================================= -->
<div id="splash-screen">
  <div class="splash-logo">
    <img src="/assets/icons/icon-192.png" alt="logo">
  </div>
  <div class="splash-title">EABaseHub</div>
  <div class="splash-sub">รีเซ็ตรหัสผ่าน</div>
  <div class="splash-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- ================================
     CARD
================================= -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo">
      <img src="/assets/icons/icon-192.png" alt="logo">
      <h1>EABaseHub</h1>
      <p>ลืมรหัสผ่าน</p>
    </div>

    <!-- Form -->
    <form id="forgotForm">

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-box">
          <i class="fa-regular fa-envelope icon-left"></i>
          <input 
            type="email"
            id="email"
            placeholder="กรอกอีเมลของคุณ"
            required
          >
        </div>
      </div>

      <button type="submit" id="resetBtn" class="btn-login">
        <span class="btn-text">ส่งลิงก์รีเซ็ตรหัสผ่าน</span>
        <span class="spinner"></span>
      </button>

    </form>

    <div class="register">
      <a href="/pages/auth/login.html">← กลับไปหน้าเข้าสู่ระบบ</a>
    </div>

  </div>
</div>

<!-- ================================
     SUCCESS OVERLAY
================================= -->
<div id="success-overlay" style="display:none;">
  <div class="overlay-box">
    <div class="overlay-ring"></div>
    <h3>ส่งอีเมลสำเร็จ</h3>
    <p>กรุณาตรวจสอบอีเมลของคุณ</p>
  </div>
</div>

<!-- Scripts -->
<script src="/js/core/supabaseClient.js"></script>

<script>
const form = document.getElementById("forgotForm");
const btn = document.getElementById("resetBtn");
const overlay = document.getElementById("success-overlay");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;

  btn.classList.add("loading");

  try {
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + "/pages/auth/update-password.html"
    });

    if (error) throw error;

    overlay.style.display = "flex";

  } catch (err) {
    alert("❌ " + err.message);
  }

  btn.classList.remove("loading");
});
</script>

</body>
</html>
