<div class="container">

  <!-- LEFT PANEL -->
  <div class="brand-panel">
    <div class="brand-content">
      <div class="brand-logo">EA</div>
      <h1>EABaseHub</h1>
      <p>ระบบจัดการข้อมูลร้านค้าและสินค้า</p>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="register-panel">
    <div class="register-card">

      <div class="register-header">
        <h2>ลืมรหัสผ่าน</h2>
        <p>กรอกอีเมลเพื่อรับลิงก์รีเซ็ต</p>
      </div>

      <div class="alert" id="alertBox"></div>

      <form id="forgotForm">

        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input type="email" id="email" required>
          </div>
        </div>

        <button class="btn-register" id="btn">
          <span class="spinner"></span>
          <span class="btn-text">ส่งลิงก์รีเซ็ต</span>
        </button>

      </form>

      <div class="login-link">
        <a href="/pages/auth/login.html">← กลับไปเข้าสู่ระบบ</a>
      </div>

    </div>
