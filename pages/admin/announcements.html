<!-- ส่วน HTML วางแทนที่ section ประชาสัมพันธ์เดิม -->
<section class="announce-section" id="announceSection">
    <div class="announce-header">
        <div class="announce-header-left">
            <span class="material-symbols-outlined">campaign</span>
            <h3>ประชาสัมพันธ์</h3>
            <span class="announce-badge" id="announceBadge" style="display:none">0</span>
        </div>
        <div class="announce-header-right">
            <a href="announcements.html" class="announce-view-all">ดูทั้งหมด →</a>
            <button class="announce-btn-add" id="announceBtnAdd" 
                    style="display:none"
                    onclick="location.href='adminAnnouncements.html'">
                <span class="material-symbols-outlined">add</span>
                สร้างประกาศ
            </button>
        </div>
    </div>
    <div class="announce-list" id="announceList">
        <!-- Cards render โดย JS -->
    </div>
</section>
