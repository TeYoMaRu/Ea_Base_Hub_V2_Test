<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังพัฒนา | EABaseHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8f5f3 0%, #f0faf8 50%, #e0f2ef 100%);
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        .icon-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 32px;
        }

        .icon-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, #26a69a, #4db6ac);
            border-radius: 50%;
            box-shadow: 
                0 20px 60px rgba(38, 166, 154, 0.3),
                0 10px 30px rgba(38, 166, 154, 0.2);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .icon-wrapper .material-symbols-outlined {
            position: relative;
            z-index: 1;
            font-size: 80px;
            color: white;
            line-height: 160px;
        }

        .gear-spin {
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1a5f5a;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: #5d8a86;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #c8e6e3;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .progress-fill {
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, #26a69a, #4db6ac);
            border-radius: 4px;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 20%; }
            50% { width: 70%; }
            100% { width: 20%; }
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #5d8a86;
            font-size: 0.95rem;
        }

        .feature-item .material-symbols-outlined {
            font-size: 20px;
            color: #26a69a;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(145deg, #26a69a, #2bbbad);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(38, 166, 154, 0.3);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(38, 166, 154, 0.4);
        }

        .btn-back .material-symbols-outlined {
            font-size: 20px;
        }

        .decoration {
            position: fixed;
            opacity: 0.05;
            color: #26a69a;
            pointer-events: none;
        }

        .decoration-1 {
            top: 10%;
            left: 5%;
            font-size: 120px;
            animation: float 6s ease-in-out infinite;
        }

        .decoration-2 {
            bottom: 15%;
            right: 8%;
            font-size: 100px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .subtitle { font-size: 1rem; }
            .icon-wrapper { width: 120px; height: 120px; }
            .icon-wrapper .material-symbols-outlined { font-size: 60px; line-height: 120px; }
        }
    </style>
</head>
<body>
    <span class="material-symbols-outlined decoration decoration-1">construction</span>
    <span class="material-symbols-outlined decoration decoration-2">code</span>

    <div class="container">
        <div class="icon-wrapper">
            <div class="icon-bg"></div>
            <span class="material-symbols-outlined gear-spin">settings</span>
        </div>

        <h1>กำลังพัฒนาฟีเจอร์นี้</h1>
        <p class="subtitle">
            ทีมพัฒนากำลังสร้างสิ่งดีๆ ให้คุณ<br>
            โปรดรอติดตามเร็วๆ นี้
        </p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="features">
            <div class="feature-item">
                <span class="material-symbols-outlined">check_circle</span>
                <span>ออกแบบ UI</span>
            </div>
            <div class="feature-item">
                <span class="material-symbols-outlined">pending</span>
                <span>พัฒนาระบบ</span>
            </div>
            <div class="feature-item">
                <span class="material-symbols-outlined">schedule</span>
                <span>ทดสอบ</span>
            </div>
        </div>

        <a href="javascript:history.back()" class="btn-back">
            <span class="material-symbols-outlined">arrow_back</span>
            กลับหน้าก่อน
        </a>
    </div>
</body>
</html>
