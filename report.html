<!DOCTYPE html>
<html lang="th">
<head>
  <!-- ===================================================== -->
  <!-- BASIC META SETTINGS                                   -->
  <!-- ===================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EABaseHub - Report Management</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ===================================================== -->
  <!-- GOOGLE FONT                                           -->
  <!-- ===================================================== -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <!-- ===================================================== -->
  <!-- EXTERNAL CSS FILE                                     -->
  <!-- ===================================================== -->
  <link rel="stylesheet" href="css/report.css">
</head>

<body>

<!-- ===================================================== -->
<!-- APP HEADER (แถบบนสุดของระบบ)                         -->
<!-- ===================================================== -->
<header class="app-header">

  <!-- โลโก้ / ชื่อระบบ -->
 
  <div class="logo"><img src="assets/icons/icon-192.png" alt="logo"><h2>EABaseHub</h2></div>
     
  <!-- แสดงชื่อผู้ใช้งาน (JS จะใส่ชื่อให้ภายหลัง) -->
  <div class="user-name">ผู้ใช้งาน</div>

</header>


<!-- ===================================================== -->
<!-- NAVIGATION MENU (เมนูหลักของระบบ)                    -->
<!-- ===================================================== -->
<nav class="app-nav">

  <!-- ปุ่มเมนูแต่ละหน้า -->
  <a href="index.html">หน้าแรก</a>
  <a href="report.html" class="active">รายงานเยี่ยมร้านค้า</a>
  <a href="formHub.html">FormsHub</a>
  <a href="formClaim.html">แจ้งเคลมสินค้า</a>

</nav>


<!-- ===================================================== -->
<!-- PAGE TITLE SECTION                                     -->
<!-- ===================================================== -->
<header class="page-header">

  <!-- ชื่อหน้า -->
  <h1>📋 Report Management</h1>

  <!-- คำอธิบายสั้น ๆ -->
  <p>กรอกข้อมูล • บันทึก • จัดการ • ส่งออก</p>

</header>


<!-- ===================================================== -->
<!-- MAIN CONTENT CONTAINER                                 -->
<!-- ===================================================== -->
<main class="container">


  <!-- ===================================================== -->
  <!-- SECTION A : FORM INPUT                                -->
  <!-- ===================================================== -->
  <div class="section">

    <h2>📝 กรอกข้อมูลรายงาน</h2>

    <!-- Grid สำหรับจัดเรียงช่องกรอก -->
    <div class="form-grid">

      <!-- วันที่ -->
      <div class="form-group">
        <label>วันที่</label>
        <input type="date" id="reportDate">
      </div>

      <!-- ร้านค้า -->
      <div class="form-group">
        <label>ร้านค้า</label>
        <select id="shopSelect">
          <option value="">-- เลือกร้านค้า --</option>
        </select>
      </div>

      <!-- หมวดสินค้า -->
      <div class="form-group">
        <label>สินค้าที่ขายกับร้านนี้</label>
        <select id="categorySelect">
          <option value="">-- เลือกหมวด --</option>
        </select>
      </div>

      <!-- สินค้า -->
      <div class="form-group">
        <label>สินค้า</label>
        <select id="productSelect">      
          <option value="">-- เลือกสินค้า --</option>
        </select>
      </div>

      <div id="dynamicAttributes"></div>
      
      <!-- แหล่งที่มา -->
      <div class="form-group">
        <label>แหล่งที่มา</label>
        <select id="source">
          <option>Walk-in</option>
          <option>LINE</option>
          <option>Facebook</option>
        </select>
      </div>

      <!-- สถานะ -->
      <div class="form-group">
        <label>สถานะ</label>
        <select id="status">
          <option>เข้าพบลูกค้า</option>
          <option>รอเข้าพบรอบต่อไป</option>
        </select>
      </div>

      <!-- ยอดสั่งซื้อ -->
      <div class="form-group">
        <label>ยอดสั่งซื้อ</label>
        <input type="number" id="amount">
      </div>

      <!-- วันที่ติดตาม -->
      <div class="form-group">
        <label>วันที่ติดตาม</label>
        <input type="date" id="followupDate">
      </div>

      <!-- หมายเหตุ -->
      <div class="form-group full">
        <label>รายละเอียด</label>
        <textarea id="note" rows="5"></textarea>
      </div>

    </div>

    <!-- ปุ่มบันทึก -->
    <div class="actions">
      <button class="btn-draft">💾 Save Draft</button>
      <button class="btn-save" onclick="saveReport()">✅ บันทึก</button>
    </div>

  </div>


  <!-- ===================================================== -->
  <!-- SECTION B : RESULT TABLE                              -->
  <!-- ===================================================== -->
  <div class="section">

    <h2>📋 รายการรายงาน</h2>

    <table>

      <!-- หัวตาราง -->    
      <thead>
        <tr>
          <th>วันที่</th>
          <th>ร้านค้า</th>
          <th>สถานะ</th>
          <th>รายละเอียด</th>
          <th>สินค้า</th>
          <th>จัดการายงานของฉัน</th>
        </tr>
      </thead>
      <thead id="reportHead"></thead>

      <!-- เนื้อหาตาราง (JS จะเติมข้อมูลให้) -->
      <tbody id="reportBody">
        <tr>
          <td colspan="6">ยังไม่มีข้อมูล</td>
        </tr>
      </tbody>

    </table>

  </div>


  <!-- ===================================================== -->
  <!-- SECTION C : EXPORT                                    -->
  <!-- ===================================================== -->
  <div class="section">

    <h2>📤 ส่งออกข้อมูล</h2>

    <div class="actions">
      <button>Export CSV</button>
      <button>Export Excel</button>
      <button>Export PDF</button>
    </div>

  </div>

</main>




<!-- ===================================================== -->
<!-- FOOTER                                                 -->
<!-- ===================================================== -->
<footer class="footer">
  © 2026 EABaseHub
</footer>


<!-- ===================================================== -->
<!-- SCRIPT SECTION                                         -->
<!-- ===================================================== -->



<!-- Core System -->
<script src="js/core/supabaseClient.js"></script>
<script src="js/core/auth.js"></script>

<!-- Page Script -->

<script src="js/report.js"></script>
</body>
</html>
