<!DOCTYPE html>
<html lang="th">
<head>
  <!-- กำหนด character encoding เป็น UTF-8 เพื่อรองรับภาษาไทย -->
  <meta charset="UTF-8">
  
  <!-- กำหนดให้หน้าเว็บแสดงผลได้ดีบนมือถือ (responsive) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- ชื่อหน้าเว็บที่แสดงบน tab เบราว์เซอร์ -->
  <title>EABaseHub | จัดการผู้ใช้และสิทธิ์</title>  

  <!-- นำเข้า Google Material Icons สำหรับใช้ไอคอนต่างๆ -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

  <!-- เชื่อมโยงไฟล์ CSS ภายนอก -->
  <link rel="stylesheet" href="css/base/adminBase.css">
  <link rel="stylesheet" href="css/adminShops.css">
</head>

<body>

  <!-- =====================================================
       HEADER SECTION (ส่วนหัวเว็บไซต์)
       แสดงโลโก้และชื่อผู้ใช้งาน
       ===================================================== -->
  <header class="app-header">
      <!-- ส่วนโลโก้และชื่อระบบ -->
      <div class="logo">
        <div class="logo-circle">
        <!-- รูปโลโก้ (ถ้ามี) -->
        <img src="assets/icons/icon-192.png" alt="logo">
        </div>
        <!-- ชื่อระบบ -->
        <h2>EABaseHub</h2>
      </div>
      </div>
      

      <!-- แสดงชื่อผู้ใช้งาน (JavaScript สามารถเปลี่ยนค่านี้ได้ภายหลัง) -->
      <div class="user-box">
        <div class="user-avatar" id="userAvatar">👤</div>

        <div class="user-info">
          <div class="user-name" id="userName">กำลังโหลด...</div>
          <!-- <div class="user-role" id="userRole"></div> -->
        </div>

        <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
      </div>
    </header>



<!-- ===================================================== -->
<!-- PAGE TITLE SECTION                                     -->
<!-- ===================================================== -->
<header class="page-header">

  <!-- ชื่อหน้า -->
  <h1>📋 การจัดการ Sales</h1>
  <!-- คำอธิบายสั้น ๆ -->
  <p>กรอกข้อมูล • บันทึก • จัดการ • ส่งออก</p>

</header>


<!-- ===================================================== -->
<!-- MAIN CONTENT CONTAINER                                 -->
<!-- ===================================================== -->
<main class="container">


  <!-- ===================================================== -->
  <!-- SECTION A : FORM INPUT                                -->
  <!-- ===================================================== -->
  <div class="card">

<div class="admin-container">

  <div class="admin-header">
    <h2 class="admin-title">
      <span class="material-symbols-outlined admin-title-icon">admin_panel_settings</span>
      จัดการผู้ใช้และสิทธิ์
    </h2>
    <button class="btn-back" onclick="goHome()">
      <span class="material-symbols-outlined btn-back-icon">arrow_back</span>
      กลับหน้าหลัก
    </button>
  </div>

  <div class="admin-tabs">
    <a class="admin-tab active" href="admintor.html">
      <span class="material-symbols-outlined">people</span>
      ผู้ใช้งาน
    </a>

    <a class="admin-tab" href="adminSales.html">
      <span class="material-symbols-outlined">badge</span>
      Sales
    </a>

    <a class="admin-tab" href="adminShops.html">
      <span class="material-symbols-outlined">store</span>
      สิทธิ์ร้านค้า
    </a>
  </div>

  <div id="tabUsers" class="tab-content active">

    <button class="btn-refresh" onclick="loadUsers()">
      <span class="material-symbols-outlined">refresh</span>
      รีเฟรช
    </button>

    <div class="admin-table-card">
      <div class="admin-table-responsive">
        <table class="admin-table">

          <thead>
            <tr>
              <th>Email</th>
              <th>Username</th>
              <th>ชื่อที่แสดง</th>
              <th>Role</th>
              <th>สถานะ</th>
              <th>จัดการ</th>
            </tr>
          </thead>

          <!-- ❗ มี tbody แค่อันเดียว -->
          <tbody id="userTable"></tbody>

        </table>
      </div>
    </div>

  </div>

</div>
</main>

<script src="js/core/supabaseClient.js"></script>
<script src="js/core/auth.js"></script>
<script src="js/admintor.js"></script>



</body>
</html>
