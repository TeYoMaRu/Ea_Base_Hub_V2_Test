<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Kanit', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(160deg, #b8e0bb, #9ed1a2, #7bcb81, #5ab860);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      animation: float 10s infinite ease-in-out;
    }

    .circle:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 20%; }
    .circle:nth-child(2) { width: 150px; height: 150px; top: 70%; left: 80%; animation-delay: 2s; }
    .circle:nth-child(3) { width: 100px; height: 100px; top: 50%; left: 10%; animation-delay: 4s; }

    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-30px); }
      100% { transform: translateY(0px); }
    }

    .container {
      max-width: 500px;
      padding: 20px;
      z-index: 2;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* LOGO */
    .logo-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .logo-wrapper::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.35), transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulseGlow 3s infinite ease-in-out;
      z-index: 0;
    }

    .logo {
      width: 110px;
      position: relative;
      z-index: 1;
      animation: logoFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.5));
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    @keyframes pulseGlow {
      0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.6; }
      50%       { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.92;
    }

    /* COUNTDOWN */
    .countdown {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      gap: 10px;
    }

    .time-box {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 15px;
      border-radius: 14px;
      width: 22%;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .time-box h2 {
      font-size: 28px;
      font-weight: 600;
    }

    .time-box span {
      font-size: 13px;
      opacity: 0.85;
    }

    /* BACK BUTTON */
    .back-btn {
      margin-top: 20px;
      display: inline-block;
      padding: 11px 22px;
      background: rgba(255, 255, 255, 0.65);
      color: #1b5e20;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: 0.3s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    .back-btn:hover {
      background: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    .footer {
      margin-top: 22px;
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">

    <div class="logo-wrapper">
      <img src="/assets/icons/icon-512.png" class="logo">
    </div>

    <h1>Coming Soon</h1>
    <p>เว็บไซต์กำลังอยู่ระหว่างพัฒนา 🚀</p>

    <div class="countdown">
      <div class="time-box">
        <h2 id="days">0</h2>
        <span>วัน</span>
      </div>
      <div class="time-box">
        <h2 id="hours">0</h2>
        <span>ชั่วโมง</span>
      </div>
      <div class="time-box">
        <h2 id="minutes">0</h2>
        <span>นาที</span>
      </div>
      <div class="time-box">
        <h2 id="seconds">0</h2>
        <span>วินาที</span>
      </div>
    </div>

    <div>
      <a href="/pages/reports/reportTracker.html" class="back-btn">← กลับหน้าแรก</a>
    </div>

    <div class="footer">
      © 2026 EABaseHub
    </div>

  </div>

  <script>
    const launchDate = new Date("2026-05-31 00:00:00").getTime();

    const countdown = () => {
      const now = new Date().getTime();
      const diff = launchDate - now;

      document.getElementById("days").innerText    = Math.floor(diff / (1000 * 60 * 60 * 24));
      document.getElementById("hours").innerText   = Math.floor((diff / (1000 * 60 * 60)) % 24);
      document.getElementById("minutes").innerText = Math.floor((diff / (1000 * 60)) % 60);
      document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);
    };

    setInterval(countdown, 1000);
    countdown();
  </script>

</body>
</html>
